<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tasche</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Setup section: shown when no instance URL is configured -->
  <div id="setup-section" class="section hidden">
    <div class="header">
      <h1 class="logo">Tasche</h1>
      <p class="subtitle">Connect to your instance</p>
    </div>
    <form id="setup-form">
      <label class="label" for="instance-url">Instance URL</label>
      <input
        id="instance-url"
        class="input"
        type="url"
        placeholder="https://tasche.example.com"
        required
        autocomplete="url"
      >
      <p class="hint">The URL of your self-hosted Tasche instance.</p>
      <button type="submit" class="btn btn-primary btn-full">Save</button>
    </form>
  </div>

  <!-- Save section: shown when instance URL is configured -->
  <div id="save-section" class="section hidden">
    <div class="header">
      <h1 class="logo">Tasche</h1>
      <button id="settings-btn" class="btn-icon" title="Settings" aria-label="Settings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
      </button>
    </div>

    <div class="page-info">
      <div class="page-title" id="page-title">Loading...</div>
      <div class="page-url" id="page-url"></div>
    </div>

    <div class="form-group">
      <label class="label" for="tag-input">Tags (optional)</label>
      <input
        id="tag-input"
        class="input"
        type="text"
        placeholder="e.g. programming, design"
      >
      <p class="hint">Comma-separated. Applied after the article is saved.</p>
    </div>

    <button id="save-btn" class="btn btn-primary btn-full">
      <span id="save-btn-text">Save to Tasche</span>
      <span id="save-btn-spinner" class="spinner hidden"></span>
    </button>

    <!-- Status messages -->
    <div id="status-success" class="status status-success hidden">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
      <div>
        <div class="status-title">Saved!</div>
        <a id="article-link" href="#" target="_blank" rel="noopener" class="status-link">Open in Tasche</a>
      </div>
    </div>

    <div id="status-error" class="status status-error hidden">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="15" y1="9" x2="9" y2="15"/>
        <line x1="9" y1="9" x2="15" y2="15"/>
      </svg>
      <div>
        <div class="status-title">Failed to save</div>
        <div id="error-detail" class="status-detail"></div>
      </div>
    </div>

    <div id="status-duplicate" class="status status-duplicate hidden">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <div>
        <div class="status-title">Already saved</div>
        <div class="status-detail">This article was re-queued for processing.</div>
        <a id="duplicate-link" href="#" target="_blank" rel="noopener" class="status-link">Open in Tasche</a>
      </div>
    </div>
  </div>

  <!-- Settings panel: change instance URL -->
  <div id="settings-section" class="section hidden">
    <div class="header">
      <h1 class="logo">Tasche</h1>
      <button id="settings-back-btn" class="btn-icon" title="Back" aria-label="Back">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"/>
          <polyline points="12 19 5 12 12 5"/>
        </svg>
      </button>
    </div>
    <form id="settings-form">
      <label class="label" for="settings-instance-url">Instance URL</label>
      <input
        id="settings-instance-url"
        class="input"
        type="url"
        placeholder="https://tasche.example.com"
        required
        autocomplete="url"
      >
      <div class="settings-actions">
        <button type="submit" class="btn btn-primary">Update</button>
        <button type="button" id="clear-btn" class="btn btn-danger">Disconnect</button>
      </div>
    </form>
  </div>

  <script src="popup.js"></script>
</body>
</html>
