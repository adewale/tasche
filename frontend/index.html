<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Tasche">
  <meta name="description" content="Save articles. Read later. Listen anywhere.">
  <title>Tasche</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="/static/icon-192.png">
  <link rel="apple-touch-icon" href="/static/icon-192.png">
</head>
<body>
  <div id="app">
    <div class="loading" style="min-height:100vh">
      <div class="spinner"></div>
    </div>
  </div>
  <noscript>Tasche requires JavaScript to run.</noscript>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('/sw.js').then(function (reg) {
          console.log('Service Worker registered:', reg.scope);

          // Detect SW updates and reload cleanly (#4)
          reg.addEventListener('updatefound', function () {
            var newWorker = reg.installing;
            if (!newWorker) return;
            newWorker.addEventListener('statechange', function () {
              if (newWorker.state === 'activated') {
                // New SW has activated — reload to use fresh assets
                window.location.reload();
              }
            });
          });
        }).catch(function (err) {
          console.warn('Service Worker registration failed:', err);
        });

        // When a new SW takes over via skipWaiting + clients.claim,
        // reload to avoid half-old-half-new state (#4)
        navigator.serviceWorker.addEventListener('controllerchange', function () {
          window.location.reload();
        });
      });
    }
  </script>
</body>
</html>
