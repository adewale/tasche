<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Save to Tasche</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  background: #f5f5f7;
  color: #1d1d1f;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 24px;
}
@media (prefers-color-scheme: dark) {
  body { background: #141416; color: #f5f5f7; }
  .card { background: #1c1c1e; border-color: #333; }
}
.card {
  text-align: center;
  background: #fff;
  border: 1px solid #d2d2d7;
  border-radius: 12px;
  padding: 24px 32px;
  max-width: 360px;
  width: 100%;
}
.status { font-size: 15px; line-height: 1.5; }
.spinner {
  display: inline-block;
  width: 18px;
  height: 18px;
  border: 2px solid currentColor;
  border-right-color: transparent;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  vertical-align: middle;
  margin-right: 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.error { color: #c0392b; }
</style>
</head>
<body>
<div class="card">
  <p class="status" id="status"><span class="spinner"></span>Saving to Tasche&hellip;</p>
</div>
<script>
(function () {
  var params = new URLSearchParams(window.location.search);
  var url = params.get('url');
  var title = params.get('title') || '';
  var el = document.getElementById('status');

  if (!url) {
    el.className = 'status error';
    el.textContent = 'No URL provided.';
    return;
  }

  fetch('/api/articles', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    credentials: 'same-origin',
    body: JSON.stringify({ url: url, title: title }),
  })
    .then(function (r) {
      if (r.ok) {
        el.textContent = 'Saved!';
        setTimeout(function () { window.close(); }, 1500);
      } else if (r.status === 401) {
        // Not logged in — redirect to the app so user can authenticate
        window.location.href = '/?url=' + encodeURIComponent(url);
      } else if (r.status === 409) {
        el.textContent = 'Already saved.';
        setTimeout(function () { window.close(); }, 1500);
      } else {
        el.className = 'status error';
        el.textContent = 'Error (' + r.status + ')';
      }
    })
    .catch(function () {
      el.className = 'status error';
      el.textContent = 'Network error';
    });
})();
</script>
</body>
</html>
